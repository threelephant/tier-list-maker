<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#15161b" />
<title>Tier List Maker</title>
<meta name="description" content="Create classic S/A/B/C tier lists — drag in images, rank, and share." />
<!-- Open Graph / link preview (static; the #/b/<id> fragment never reaches crawlers, so every shared link shows this card) -->
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Tier List Maker" />
<meta property="og:title" content="Tier List Maker" />
<meta property="og:description" content="Create classic S/A/B/C tier lists — drag in images, rank, and share." />
<meta property="og:url" content="https://threelephant.github.io/tier-list-maker/" />
<meta property="og:image" content="https://threelephant.github.io/tier-list-maker/og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Tier List Maker" />
<meta name="twitter:description" content="Create classic S/A/B/C tier lists — drag in images, rank, and share." />
<meta name="twitter:image" content="https://threelephant.github.io/tier-list-maker/og.png" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%2315161b'/%3E%3Crect%20x='12'%20y='10'%20width='40'%20height='8'%20rx='4'%20fill='%23ff7f7f'/%3E%3Crect%20x='12'%20y='22'%20width='40'%20height='8'%20rx='4'%20fill='%23ffbf7f'/%3E%3Crect%20x='12'%20y='34'%20width='40'%20height='8'%20rx='4'%20fill='%23ffff7f'/%3E%3Crect%20x='12'%20y='46'%20width='40'%20height='8'%20rx='4'%20fill='%237fff7f'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #15161b;
    --panel: #1f2128;
    --panel-2: #262934;
    --line: #33363f;
    --text: #e9eaed;
    --muted: #9aa0ac;
    --accent: #6ea8fe;
    --danger: #ff6b6b;
    --radius: 10px;
    --cell: 92px;
    --shadow: 0 2px 8px rgba(0,0,0,.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- Toolbar ---------- */
  header {
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 12px 18px;
    background: rgba(21,22,27,.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-size: 17px;
    margin: 0;
    margin-right: auto;
    letter-spacing: .2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 .logo { font-size: 20px; }

  .btn {
    appearance: none;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--text);
    padding: 8px 13px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background .12s, border-color .12s, transform .04s;
    white-space: nowrap;
  }
  .btn:hover { background: #2f323d; border-color: #444956; }
  .btn:active { transform: translateY(1px); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #0b1730; }
  .btn.primary:hover { background: #8bbbff; }
  .btn.ghost { background: transparent; }
  .btn.danger:hover { background: #3a2226; border-color: var(--danger); color: #ffb4b4; }

  /* ---------- Board ---------- */
  main { padding: 18px; max-width: 1200px; margin: 0 auto; }

  .board { display: flex; flex-direction: column; gap: 8px; }

  .tier {
    display: flex;
    align-items: stretch;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    min-height: calc(var(--cell) + 24px);
  }

  .tier-label {
    position: relative;
    flex: 0 0 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px 6px;
    font-weight: 800;
    font-size: 22px;
    line-height: 1.1;
    word-break: break-word;
    cursor: text;
    outline: none;
    user-select: none;
  }
  .tier-label:focus { box-shadow: inset 0 0 0 2px rgba(255,255,255,.55); }
  .tier-label .color-input {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    width: 22px;
    height: 14px;
    padding: 0;
    border: none;
    border-radius: 3px;
    background: none;
    cursor: pointer;
    opacity: 0;
    transition: opacity .12s;
  }
  .tier:hover .tier-label .color-input { opacity: .85; }
  .tier-label .color-input::-webkit-color-swatch-wrapper { padding: 0; }
  .tier-label .color-input::-webkit-color-swatch { border: 1px solid rgba(0,0,0,.4); border-radius: 3px; }

  .dropzone {
    flex: 1 1 auto;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 6px;
    padding: 8px;
    min-height: calc(var(--cell) + 24px);
    transition: background .12s, box-shadow .12s;
  }
  .dropzone.drag-over { background: rgba(110,168,254,.10); box-shadow: inset 0 0 0 2px rgba(110,168,254,.5); }

  .tier-controls {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    padding: 6px;
    border-left: 1px solid var(--line);
    background: rgba(0,0,0,.12);
  }
  .tier-controls button {
    width: 26px; height: 24px;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    background: var(--panel-2);
    color: var(--muted);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }
  .tier-controls button:hover { color: var(--text); background: #30333d; }
  .tier-controls button.del:hover { color: #ffb4b4; border-color: var(--danger); }
  .tier-controls button:disabled { opacity: .3; cursor: default; }

  .add-tier {
    margin-top: 4px;
    width: 100%;
    border: 1px dashed var(--line);
    background: transparent;
    color: var(--muted);
    padding: 11px;
    border-radius: var(--radius);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
  }
  .add-tier:hover { color: var(--text); border-color: #4a4f5c; background: var(--panel); }

  /* ---------- Pool ---------- */
  .pool {
    margin-top: 18px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .pool-head {
    display: flex; align-items: center; gap: 8px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--line);
    font-size: 12px; font-weight: 700; letter-spacing: .6px;
    color: var(--muted); text-transform: uppercase;
  }
  .pool .dropzone { min-height: calc(var(--cell) + 28px); }
  .hint {
    color: var(--muted);
    font-size: 13px;
    padding: 22px 8px;
    margin: auto;
    text-align: center;
    pointer-events: none;
  }
  .hint kbd {
    background: var(--panel-2); border: 1px solid var(--line);
    border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; font-size: 12px;
  }

  /* ---------- Card ---------- */
  .card {
    position: relative;
    width: var(--cell);
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    cursor: grab;
    box-shadow: var(--shadow);
    transition: transform .08s, box-shadow .08s;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.45); }
  .card.dragging { opacity: .4; cursor: grabbing; }
  /* Floating clone that follows the finger during a touch drag */
  .card.drag-ghost {
    position: fixed;
    z-index: 1000;
    margin: 0;
    pointer-events: none;
    opacity: .92;
    transform: scale(1.06);
    box-shadow: 0 14px 34px rgba(0,0,0,.6);
    transition: none;
  }
  .card.drag-ghost:hover { transform: scale(1.06); }
  .card img {
    display: block;
    width: 100%;
    height: var(--cell);
    object-fit: cover;
    background: #0d0e12;
    pointer-events: none;
  }
  /* Monogram block for image-less items */
  .card .stub {
    height: var(--cell);
    display: grid;
    place-items: center;
    font-size: 30px;
    font-weight: 800;
    color: #fff;
    letter-spacing: .5px;
    user-select: none;
    pointer-events: none;
  }
  .mini-cell.stub-mini {
    display: grid;
    place-items: center;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
  }
  .card .cap {
    padding: 4px 5px;
    font-size: 11px;
    line-height: 1.25;
    text-align: center;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card .del {
    position: absolute;
    top: 3px; right: 3px;
    width: 20px; height: 20px;
    border: none; border-radius: 50%;
    background: rgba(10,11,15,.72);
    color: #fff; font-size: 14px; line-height: 1;
    cursor: pointer;
    display: none;
    place-items: center;
  }
  .card:hover .del { display: grid; }
  .card .del:hover { background: var(--danger); }

  .card.placeholder {
    background: transparent;
    border: 2px dashed var(--accent);
    box-shadow: none;
    height: calc(var(--cell) + 23px);
    pointer-events: none;
  }
  .card.placeholder:hover { transform: none; }

  /* ---------- Modal ---------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 50; padding: 20px;
  }
  .overlay.show { display: flex; }
  .modal {
    width: 100%; max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 18px 50px rgba(0,0,0,.55);
    overflow: hidden;
  }
  .modal-body { padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .modal .preview {
    width: 100%; height: 150px; object-fit: contain;
    background: #0d0e12; border: 1px solid var(--line); border-radius: 8px;
  }
  .modal .preview.is-stub {
    display: grid; place-items: center;
    font-size: 56px; font-weight: 800; color: #fff;
  }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 600; }
  .field input[type=text], .field textarea {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 9px 10px; font-size: 14px; font-family: inherit; resize: vertical;
  }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; padding: 0 18px 18px; }
  .modal-actions .spacer { flex: 1; }

  /* ---------- Toasts ---------- */
  #toasts {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 80; align-items: center;
  }
  .toast {
    background: var(--panel-2); border: 1px solid var(--line);
    color: var(--text); padding: 10px 16px; border-radius: 9px;
    font-size: 13px; box-shadow: var(--shadow);
    animation: pop .18s ease-out;
  }
  .toast.err { border-color: var(--danger); color: #ffc2c2; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  body.file-dragging .pool .dropzone { background: rgba(110,168,254,.08); box-shadow: inset 0 0 0 2px rgba(110,168,254,.4); }

  /* ---------- Views ---------- */
  [hidden] { display: none !important; }

  /* ---------- Board header extras ---------- */
  .back-btn { flex: 0 0 auto; }
  .board-name {
    flex: 0 1 auto;
    min-width: 120px; max-width: 340px;
    background: transparent;
    border: 1px solid transparent;
    color: var(--text);
    font-size: 17px; font-weight: 700;
    padding: 6px 9px;
    border-radius: 8px;
    font-family: inherit;
  }
  .board-name:hover { border-color: var(--line); }
  .board-name:focus { outline: none; border-color: var(--accent); background: var(--bg); }
  .header-spacer { flex: 1 1 auto; }

  /* ---------- Menu ---------- */
  #menuGrid { display: block; }
  .section-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 16px;
  }
  .list-card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform .1s, border-color .1s, box-shadow .1s;
  }
  .list-card:hover { transform: translateY(-3px); border-color: #454b59; box-shadow: 0 10px 24px rgba(0,0,0,.45); }

  .list-preview {
    display: flex; flex-direction: column; gap: 5px;
    padding: 10px;
    background: var(--bg);
    min-height: 104px;
  }
  .mini-tier { display: flex; align-items: center; gap: 4px; min-height: 22px; }
  .mini-chip {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border-radius: 4px;
    display: grid; place-items: center;
    font-size: 10px; font-weight: 800;
  }
  .mini-cells { display: flex; align-items: center; gap: 3px; overflow: hidden; }
  .mini-cell {
    width: 22px; height: 22px;
    border-radius: 3px;
    object-fit: cover;
    background: var(--panel-2);
    flex: 0 0 auto;
  }
  .mini-more { font-size: 10px; color: var(--muted); padding-left: 2px; white-space: nowrap; }
  .list-preview-empty {
    margin: auto;
    color: var(--muted);
    font-size: 12.5px;
  }

  .list-meta { padding: 11px 12px; border-top: 1px solid var(--line); }
  .list-name {
    font-size: 14px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .list-sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; }

  .list-actions {
    position: absolute; top: 8px; right: 8px;
    display: flex; gap: 6px;
    opacity: 0; transition: opacity .12s;
  }
  .list-card:hover .list-actions { opacity: 1; }
  .list-actions button {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border: 1px solid var(--line);
    background: rgba(13,14,18,.82);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer; font-size: 13px; line-height: 1;
  }
  .list-actions button:hover { background: var(--panel-2); }
  .list-actions button.del:hover { color: #ffb4b4; border-color: var(--danger); }

  .menu-empty { max-width: 460px; margin: 10vh auto; text-align: center; color: var(--muted); }
  .menu-empty-art { font-size: 54px; line-height: 1; }
  .menu-empty h2 { color: var(--text); margin: 12px 0 6px; }
  .menu-empty p { margin: 0 0 18px; }

  /* ---------- Auth (avatar + menu) ---------- */
  .auth-area { display: flex; align-items: center; gap: 8px; margin-left: auto; position: relative; }
  .avatar-btn {
    width: 32px; height: 32px; padding: 0; border-radius: 50%;
    border: 1px solid var(--line); background: var(--panel-2);
    color: var(--text); font-weight: 700; font-size: 13px;
    cursor: pointer; overflow: hidden; display: grid; place-items: center;
  }
  .avatar-btn img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-btn:hover { border-color: var(--accent); }
  .user-menu {
    position: absolute; top: 42px; right: 0;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; box-shadow: 0 12px 30px rgba(0,0,0,.5);
    padding: 12px; min-width: 210px; z-index: 60;
    display: flex; flex-direction: column; gap: 10px;
  }
  .user-menu .who { font-size: 12px; color: var(--muted); word-break: break-word; }
  .user-menu .who b { color: var(--text); display: block; font-size: 14px; }

  /* ---------- Sharing ---------- */
  .vis-select {
    flex: 0 0 auto;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 9px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .vis-select:focus { outline: none; border-color: var(--accent); }
  .ro-banner {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: rgba(110,168,254,.10);
    border-bottom: 1px solid var(--line);
    color: var(--text); font-size: 13px;
    padding: 9px 14px;
  }
  .btn.small { padding: 5px 10px; font-size: 12px; }

  /* ---------- Menu sections ---------- */
  .menu-section-title {
    font-size: 12px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
    color: var(--muted); margin: 22px 2px 10px;
  }
  .menu-section:first-child .menu-section-title { margin-top: 0; }

  /* ---------- Add tile + uploading spinner ---------- */
  .card.add-tile {
    border: 2px dashed var(--line); background: transparent; box-shadow: none;
    display: grid; place-items: center; cursor: pointer;
    height: calc(var(--cell) + 23px); color: var(--muted);
  }
  .card.add-tile:hover { border-color: var(--accent); color: var(--text); transform: translateY(-2px); box-shadow: none; }
  .add-tile .plus { font-size: 30px; line-height: 1; font-weight: 300; }
  .card.uploading::after {
    content: ""; position: absolute; top: 6px; left: 6px;
    width: 16px; height: 16px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Danger zone ---------- */
  .danger-zone { text-align: center; margin: 26px 0 10px; }
  .link-danger {
    background: none; border: none; color: var(--muted);
    font-size: 12px; cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
  }
  .link-danger:hover { color: var(--danger); }

  /* ---------- Sync progress ---------- */
  .sync-modal { max-width: 360px; }
  .sync-title { margin: 0 0 12px; font-size: 16px; }
  .sync-label { font-size: 13px; color: var(--muted); margin-bottom: 10px; min-height: 18px; }
  .progress-track { height: 8px; background: var(--bg); border: 1px solid var(--line); border-radius: 999px; overflow: hidden; }
  .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width .2s ease; }
</style>
</head>
<body>
  <!-- Menu view (main page) -->
  <div id="menuView">
    <header class="menu-header">
      <h1><span class="logo">🏆</span> Tier Lists</h1>
      <div id="authArea" class="auth-area"></div>
      <button class="btn primary" id="newListBtn">+ New list</button>
      <button class="btn" id="importListBtn">Import list</button>
    </header>
    <main>
      <div id="menuGrid"></div>
      <div id="menuEmpty" class="menu-empty" hidden>
        <div class="menu-empty-art">🏆</div>
        <h2>No tier lists yet</h2>
        <p>Create your first tier list, or import one from a JSON file.</p>
        <button class="btn primary" id="newListBtn2">+ New list</button>
      </div>
    </main>
  </div>

  <!-- Board view -->
  <div id="boardView" hidden>
    <header>
      <button class="btn ghost back-btn" id="backBtn" title="All lists">← Lists</button>
      <input id="boardName" class="board-name" maxlength="80" placeholder="Untitled list" aria-label="List name" />
      <span class="header-spacer"></span>
      <select id="visibilitySelect" class="vis-select" hidden title="Who can see this list" aria-label="List visibility">
        <option value="private">🔒 Private</option>
        <option value="public">🌐 Public</option>
        <option value="shared">🔗 Shared (by link)</option>
      </select>
      <button class="btn" id="shareBtn" hidden>Share</button>
      <button class="btn" id="exportPngBtn">Export PNG</button>
      <button class="btn" id="exportJsonBtn">Export JSON</button>
      <button class="btn danger ghost" id="resetBtn" title="Move all items back to Unranked">Reset</button>
    </header>

    <div class="ro-banner" id="roBanner" hidden>
      <span>👁 You're viewing a public list — read-only.</span>
      <button class="btn small" id="roDup">Duplicate to my lists</button>
    </div>

    <main>
      <div class="board" id="board"></div>
      <button class="add-tier" id="addTierBtn">+ Add tier</button>

      <section class="pool">
        <div class="pool-head">Unranked</div>
        <div class="dropzone" id="pool" data-container="pool"></div>
      </section>

      <div class="danger-zone" id="dangerZone" hidden>
        <button class="link-danger" id="removeAllBtn">Remove all items…</button>
      </div>
    </main>
  </div>

  <!-- Sync progress -->
  <div class="overlay" id="syncOverlay">
    <div class="modal sync-modal">
      <div class="modal-body">
        <h3 class="sync-title">Uploading your lists…</h3>
        <div class="sync-label" id="syncLabel">Preparing…</div>
        <div class="progress-track"><div class="progress-bar" id="syncBar"></div></div>
      </div>
    </div>
  </div>

  <!-- Item editor -->
  <div class="overlay" id="editorOverlay">
    <div class="modal">
      <div class="modal-body">
        <img class="preview" id="editPreview" alt="" />
        <div class="preview is-stub" id="editStub" hidden></div>
        <div class="field">
          <label for="editName">Name</label>
          <input type="text" id="editName" maxlength="80" placeholder="Item name" />
        </div>
        <div class="field">
          <label for="editDesc">Description (optional)</label>

<script>
"use strict";

/* ============================================================
   State
   ============================================================ */
const DEFAULT_TIERS = [
  { name: "S", color: "#ff7f7f" },
  { name: "A", color: "#ffbf7f" },
  { name: "B", color: "#ffdf7f" },
  { name: "C", color: "#ffff7f" },
  { name: "D", color: "#bfff7f" },
  { name: "F", color: "#7fff7f" },
];

// A "board" is one tier list: { id, name, version, tiers, pool, items, createdAt, updatedAt }
let state = null;        // the currently-open board (null while on the menu)
let itemCounter = 0;     // for default "Item N" names within the open board
let boardsCache = [];    // every board, for the menu
let order = [];          // board ids in menu order
let currentView = "menu";

const uid = () =>
  (crypto.randomUUID ? crypto.randomUUID() : "id-" + Date.now() + "-" + Math.random().toString(36).slice(2));

const nowMs = () => Date.now();

function defaultTiers() {
  return DEFAULT_TIERS.map((t) => ({ id: uid(), name: t.name, color: t.color, items: [] }));
}

function newBoard(name) {
  const t = nowMs();
  return { id: uid(), name: name || "Untitled list", version: 1,
    tiers: defaultTiers(), pool: [], items: {}, createdAt: t, updatedAt: t };
}

/* ============================================================
   Supabase client + auth
   ============================================================ */
const SUPABASE_URL = "https://hizumyjjthjxahykrhpo.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_m-JUQuQKtCIUSvoGHjYQeQ_z5hhv3ji";
let sb = null;
try { if (window.supabase) sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); }
catch (e) { console.warn("Supabase init failed:", e); }

let currentUser = null;   // { id, email, name, avatar } when signed in
let canEdit = true;       // can the viewer edit the open board?
const byId = (id) => document.getElementById(id);

async function signInWithGoogle() {

async function signOutUser() {
  if (!sb) return;
  await sb.auth.signOut();
  location.hash = "#/";
  location.reload();
}
function setUserFromSession(session) {
  if (session && session.user) {
    const u = session.user, m = u.user_metadata || {};

      name: m.name || m.full_name || null, avatar: m.avatar_url || m.picture || null };

}
function initials(s) {
  return (s || "?").trim().split(/\s+/).slice(0, 2).map((w) => w[0]).join("").toUpperCase() || "?";
}

// Deterministic color from a string (for image-less item monograms). Returns an hsl() string
// usable in CSS and canvas fillStyle; pair with white text.
function colorFromString(s) {
  const str = s || "?";
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) % 360;
  return `hsl(${h}, 46%, 42%)`;
}

function renderAuth() {
  const el = byId("authArea");
  el.innerHTML = "";
  if (!currentUser) {
    const inb = document.createElement("button");

function closeUserMenu() {

function toggleUserMenu() {

  menu.className = "user-menu";

  setTimeout(() => document.addEventListener("click", closeUserMenu), 0);
}

/* ============================================================
   Persistence (IndexedDB) — v2: a "boards" store + an "app" store
   ============================================================ */
let db = null;
let saveTimer = null;

function openDB() {
  return new Promise((resolve) => {
    let req;
    try { req = indexedDB.open("tierlist", 2); }
    catch (e) { return resolve(null); }
    req.onupgradeneeded = () => {
      const d = req.result;
      if (!d.objectStoreNames.contains("state")) d.createObjectStore("state");   // v1, kept for migration
      if (!d.objectStoreNames.contains("boards")) d.createObjectStore("boards"); // id -> board
      if (!d.objectStoreNames.contains("app")) d.createObjectStore("app");       // key -> value (order, lastOpened)
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}

function dbGet(store, key) {
  return new Promise((resolve) => {
    if (!db) return resolve(null);
    try {
      const r = db.transaction(store, "readonly").objectStore(store).get(key);
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => resolve(null);
    } catch (e) { resolve(null); }
  });
}
function dbGetAll(store) {
  return new Promise((resolve) => {
    if (!db) return resolve([]);
    try {
      const r = db.transaction(store, "readonly").objectStore(store).getAll();
      r.onsuccess = () => resolve(r.result || []);
      r.onerror = () => resolve([]);
    } catch (e) { resolve([]); }
  });
}
function dbPut(store, value, key) {
  return new Promise((resolve) => {
    if (!db) return resolve(false);
    try {
      const r = db.transaction(store, "readwrite").objectStore(store).put(value, key);
      r.onsuccess = () => resolve(true);
      r.onerror = () => resolve(false);
    } catch (e) { resolve(false); }
  });
}
function dbDelete(store, key) {
  return new Promise((resolve) => {
    if (!db) return resolve(false);
    try {
      const r = db.transaction(store, "readwrite").objectStore(store).delete(key);
      r.onsuccess = () => resolve(true);
      r.onerror = () => resolve(false);
    } catch (e) { resolve(false); }
  });
}

const lsPutBoard = (b) => dbPut("boards", b, b.id);
const lsDeleteBoard = (id) => dbDelete("boards", id);
const setOrderDB = () => dbPut("app", order.slice(), "order");
const setLastOpened = (id) => dbPut("app", id, "lastOpened");

// One-time migration of the old single board (v1 `state.current`) into the local store.
async function migrateIfNeeded() {
  if (boardsCache.length > 0) return;
  const legacy = await dbGet("state", "current");
  if (legacy && Array.isArray(legacy.tiers) && legacy.items) {
    const t = nowMs();
    const board = { id: uid(), name: "My Tier List", version: 1,
      tiers: legacy.tiers, pool: Array.isArray(legacy.pool) ? legacy.pool : [],
      items: legacy.items, createdAt: t, updatedAt: t };
    boardsCache = [board];
    order = [board.id];
    await lsPutBoard(board);
    await setOrderDB();
    await setLastOpened(board.id);
  }
}

function orderedBoards() {
  const map = new Map(boardsCache.map((b) => [b.id, b]));
  return order.map((id) => map.get(id)).filter(Boolean);
}

/* ============================================================
   Backends: local (IndexedDB) and cloud (Supabase)
   ============================================================ */
function rowToBoard(row) {
  const d = row.data || {};
  return {
    id: row.id, owner: row.owner, name: row.name,
    visibility: row.visibility || "private", version: 1,
    tiers: Array.isArray(d.tiers) ? d.tiers : [],
    pool: Array.isArray(d.pool) ? d.pool : [],
    items: d.items && typeof d.items === "object" ? d.items : {},
    createdAt: Date.parse(row.created_at) || nowMs(),
    updatedAt: Date.parse(row.updated_at) || nowMs(),
    position: row.position || 0,
  };
}
function boardData(b) {
  // Strip the transient `uploading` flag so it never lands in storage.
  const items = {};
  for (const [k, v] of Object.entries(b.items || {})) {
    if (v && v.uploading) { const { uploading, ...rest } = v; items[k] = rest; }
    else items[k] = v;
  }
  return { tiers: b.tiers, pool: b.pool, items };
}

// Fetch any list by id that the viewer is allowed to read (own or public). RLS enforces access.
async function cloudFetchOne(id) {
  if (!sb) return null;
  const { data, error } = await sb.from("tier_lists").select("*").eq("id", id).maybeSingle();
  if (error || !data) return null;
  return { board: rowToBoard(data), canEdit: !!currentUser && data.owner === currentUser.id };
}

// Copy a board's images into the current user's Storage folder, rewriting item.image to the
// new public URLs. Handles base64 data: URLs (local boards) and foreign Storage URLs (duplicating
// someone else's public list) — anything not already under this user's own folder.
async function rehostImagesToStorage(board) {
  if (!sb || !currentUser) return;
  const ownPrefix = `/tier-images/${currentUser.id}/`;
  for (const [itemId, it] of Object.entries(board.items || {})) {
    const img = it.image;
    if (typeof img !== "string") continue;
    const isData = img.startsWith("data:");
    const isForeign = /^https?:/.test(img) && !img.includes(ownPrefix);
    if (!isData && !isForeign) continue;
    try {
      const blob = await (await fetch(img)).blob();
      const path = `${currentUser.id}/${board.id}/${itemId}.png`;
      const up = await sb.storage.from("tier-images").upload(path, blob, { contentType: "image/png", upsert: true });
      if (!up.error) it.image = sb.storage.from("tier-images").getPublicUrl(path).data.publicUrl;
    } catch (e) { /* keep original as fallback */ }
  }
}

const localBackend = {
  mode: "local",
  async load() {
    boardsCache = await dbGetAll("boards");
    order = (await dbGet("app", "order")) || [];
    const ids = new Set(boardsCache.map((b) => b.id));
    order = order.filter((id) => ids.has(id));
    boardsCache.forEach((b) => { if (!order.includes(b.id)) order.push(b.id); });
    await migrateIfNeeded();
  },
  async save(b) { b.updatedAt = nowMs(); await lsPutBoard(b); await setOrderDB(); return true; },
  async remove(id) { await lsDeleteBoard(id); await setOrderDB(); },
  async fetchOne(id) {
    const local = boardsCache.find((b) => b.id === id) || (await dbGet("boards", id));
    if (local) return { board: local, canEdit: true };
    return cloudFetchOne(id); // a shared public cloud list opened while logged out
  },
  async processImage(file) { return (await toDownscaledBlob(file)).dataURL; },
};

const cloudBackend = {
  mode: "cloud",
  async load() {
    boardsCache = []; order = [];
    if (!sb || !currentUser) return;
    const { data, error } = await sb.from("tier_lists")
      .select("*").eq("owner", currentUser.id)
      .order("position", { ascending: true }).order("created_at", { ascending: true });
    if (error) { toast("Couldn't load your lists", "err"); return; }
    boardsCache = (data || []).map(rowToBoard);
    order = boardsCache.map((b) => b.id);
  },
  async save(b) {
    if (!sb || !currentUser) return false;
    const pos = order.indexOf(b.id);
    const { error } = await sb.from("tier_lists").upsert({
      id: b.id, owner: currentUser.id, name: b.name,
      visibility: b.visibility || "private", data: boardData(b),
      position: pos < 0 ? 0 : pos,
    });
    if (error) { console.warn("cloud save failed", error); return false; }
    return true;
  },
  async remove(id) {
    if (!sb || !currentUser) return;
    const { error } = await sb.from("tier_lists").delete().eq("id", id);
    if (error) toast("Cloud delete failed", "err");
  },
  async fetchOne(id) {
    const owned = boardsCache.find((b) => b.id === id);
    if (owned) return { board: owned, canEdit: true };
    return cloudFetchOne(id);
  },
  async processImage(file, itemId) {
    const { blob } = await toDownscaledBlob(file);
    const path = `${currentUser.id}/${state.id}/${itemId}.png`;
    const up = await sb.storage.from("tier-images").upload(path, blob, { contentType: "image/png", upsert: true });
    if (up.error) throw up.error;
    return sb.storage.from("tier-images").getPublicUrl(path).data.publicUrl;
  },
};

let backend = localBackend;
let pendingBoard = null; // the board awaiting a debounced save (captured so navigation can't swap it)

// Debounced save of the currently-open board. Keeps the in-memory cache fresh immediately.
function persist() {
  if (!state || !canEdit) return;
  state.updatedAt = nowMs();
  const i = boardsCache.findIndex((b) => b.id === state.id);
  if (i >= 0) boardsCache[i] = state; else boardsCache.push(state);
  if (!order.includes(state.id)) order.push(state.id);
  pendingBoard = state;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 300);
}

// Write any pending edit immediately (before navigating away / closing the tab),
// using the captured board so it can't be clobbered by a state change.
function flushSave() {
  clearTimeout(saveTimer);
  saveTimer = null;
  if (!pendingBoard) return;
  const b = pendingBoard;
  pendingBoard = null;
  Promise.resolve(backend.save(b)).then((ok) => {
    if (ok === false) toast("Couldn't sync to cloud — changes may not be saved", "err");
  });
}

/* ============================================================
   Views, routing & board lifecycle
   ============================================================ */
const menuView = document.getElementById("menuView");
const boardView = document.getElementById("boardView");
const menuGrid = document.getElementById("menuGrid");
const menuEmpty = document.getElementById("menuEmpty");
const boardNameInput = document.getElementById("boardName");

function goMenu() { flushSave(); location.hash = "#/"; }
function goBoard(id) { flushSave(); location.hash = "#/b/" + id; }

async function route() {
  const m = location.hash.match(/^#\/b\/(.+)$/);
  if (m) {
    const id = decodeURIComponent(m[1]);
    const cached = boardsCache.find((b) => b.id === id);
    if (cached) {
      const editable = backend.mode === "local" || (!!currentUser && cached.owner === currentUser.id);
      openBoard(cached, editable);
      return;
    }
    const res = await backend.fetchOne(id);
    if (res && res.board) { openBoard(res.board, res.canEdit); return; }
    toast("List not found or private", "err");
  }
  showMenu();
}

function showMenu() {
  currentView = "menu";
  state = null;
  boardView.hidden = true;
  menuView.hidden = false;
  renderMenu();
}

function openBoard(board, editable) {
  currentView = "board";
  state = board;
  canEdit = editable !== false;
  itemCounter = Object.keys(board.items).length;
  if (backend.mode === "local" && canEdit) setLastOpened(board.id);
  boardNameInput.value = board.name;
  menuView.hidden = true;
  boardView.hidden = false;
  applyEditableUI();
  render();
}

async function createBoard() {
  const b = newBoard();
  if (backend.mode === "cloud" && currentUser) { b.owner = currentUser.id; b.visibility = "private"; }
  boardsCache.push(b);
  order.push(b.id);
  const ok = await backend.save(b);
  if (ok === false) {
    boardsCache = boardsCache.filter((x) => x.id !== b.id);
    order = order.filter((x) => x !== b.id);
    toast("Couldn't create the list (cloud save failed)", "err");
    return;
  }
  goBoard(b.id);
  setTimeout(() => { if (canEdit) { boardNameInput.focus(); boardNameInput.select(); } }, 60);
}

async function deleteBoard(id) {
  const b = boardsCache.find((x) => x.id === id);
  if (!b) return;
  if (!confirm(`Delete "${b.name}"? This can't be undone.`)) return;
  boardsCache = boardsCache.filter((x) => x.id !== id);
  order = order.filter((x) => x !== id);
  await backend.remove(id);
  toast("List deleted");
  if (state && state.id === id) goMenu(); else renderMenu();
}

async function duplicateBoard(id) {
  const b = boardsCache.find((x) => x.id === id);
  if (!b) return;
  const copy = JSON.parse(JSON.stringify(b));
  copy.id = uid();
  copy.name = b.name + " (copy)";
  copy.createdAt = nowMs(); copy.updatedAt = nowMs();
  if (backend.mode === "cloud" && currentUser) { copy.owner = currentUser.id; copy.visibility = "private"; }
  boardsCache.push(copy);
  order.push(copy.id);
  await backend.save(copy);
  renderMenu();
  toast("List duplicated");
}

function renameBoard(id, name) {
  const b = boardsCache.find((x) => x.id === id);
  if (!b) return;
  const trimmed = (name || "").trim();
  if (!trimmed) return;
  b.name = trimmed;
  b.updatedAt = nowMs();
  backend.save(b);
  if (state && state.id === id) boardNameInput.value = b.name;
}

/* ---- read-only vs editable UI + sharing (cloud, owner only) ---- */
function applyEditableUI() {
  const cloudOwner = canEdit && backend.mode === "cloud" && !!(state && state.owner);
  byId("addTierBtn").hidden = !canEdit;
  byId("resetBtn").hidden = !canEdit;
  byId("dangerZone").hidden = !canEdit;
  boardNameInput.readOnly = !canEdit;
  byId("shareBtn").hidden = !cloudOwner;
  const sel = byId("visibilitySelect");
  sel.hidden = !cloudOwner;
  if (cloudOwner) sel.value = state.visibility || "private";
  byId("roBanner").hidden = canEdit;
  byId("roDup").textContent = currentUser ? "Duplicate to my lists" : "Sign in to save a copy";
}

function appLink(id) { return location.origin + location.pathname + "#/b/" + id; }

async function setVisibility(v) {
  if (!state || !canEdit || backend.mode !== "cloud") return;
  state.visibility = v;
  const i = boardsCache.findIndex((b) => b.id === state.id);
  if (i >= 0) boardsCache[i] = state;
  await backend.save(state);
  applyEditableUI();
  const msg = v === "public" ? "Public — shareable by link, shown under “Public”"
            : v === "shared" ? "Shared — anyone with the link can view; shown under “Shared” on your home"
            : "Private — only you can see this";
  toast(msg);
}

async function shareCurrent() {
  if (!state) return;
  if (backend.mode !== "cloud") return toast("Sign in to share lists", "err");
  if (state.visibility === "private") {
    if (!confirm("Make this list shareable by link? It becomes “Shared” — anyone with the link can view. It stays on your home under “Shared” but isn't publicly listed.")) return;
    await setVisibility("shared");
  }
  const link = appLink(state.id);
  try { await navigator.clipboard.writeText(link); toast("Share link copied"); }
  catch (e) { prompt("Copy this share link:", link); }
}

async function duplicateOpenToMyLists() {
  if (!currentUser) return signInWithGoogle();
  const copy = JSON.parse(JSON.stringify(state));
  copy.id = uid(); copy.owner = currentUser.id; copy.visibility = "private";
  copy.name = state.name + " (copy)";
  copy.createdAt = nowMs(); copy.updatedAt = nowMs();
  toast("Saving a copy…");
  await rehostImagesToStorage(copy); // copy images into my own Storage folder
  boardsCache.push(copy); order.push(copy.id);
  const ok = await cloudBackend.save(copy);
  if (ok === false) {
    boardsCache = boardsCache.filter((x) => x.id !== copy.id);
    order = order.filter((x) => x !== copy.id);
    toast("Couldn't save a copy", "err");
    return;
  }
  toast("Saved to your lists");
  goBoard(copy.id);
}

/* ---- one-time local → cloud sync on first sign-in ---- */
async function maybeOfferSync() {
  if (!currentUser || !sb || !db) return;
  const flagKey = "synced_" + currentUser.id;
  if ((await dbGet("app", flagKey)) === true) return;
  const localBoards = await dbGetAll("boards");
  if (!localBoards.length) { await dbPut("app", true, flagKey); return; }
  const n = localBoards.length;
  if (!confirm(`Upload your ${n} local tier list${n > 1 ? "s" : ""} to your account?`)) {
    await dbPut("app", true, flagKey);
    return;
  }
  const overlay = byId("syncOverlay");
  const bar = byId("syncBar");
  const label = byId("syncLabel");
  bar.style.width = "0%";
  overlay.classList.add("show");
  let done = 0;
  for (const lb of localBoards) {
    label.textContent = `Uploading “${lb.name || "Untitled list"}” — ${done + 1} of ${n}`;
    try {
      const board = JSON.parse(JSON.stringify(lb));
      await rehostImagesToStorage(board);
      const pos = order.length + localBoards.indexOf(lb); // distinct, increasing positions
      await sb.from("tier_lists").insert({
        id: board.id, owner: currentUser.id, name: board.name || "Untitled list",
        visibility: "private",
        data: { tiers: board.tiers || [], pool: board.pool || [], items: board.items || {} },
        position: pos,
      });
    } catch (e) { console.warn("sync failed for a board", e); }
    done++;
    bar.style.width = Math.round((done / n) * 100) + "%";
  }
  await dbPut("app", true, flagKey);
  await cloudBackend.load();
  overlay.classList.remove("show");
  renderMenu();
  toast("Local lists uploaded to your account");
}

function timeAgo(ts) {
  if (!ts) return "—";
  const s = Math.floor((nowMs() - ts) / 1000);
  if (s < 60) return "just now";
  const m = Math.floor(s / 60); if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60); if (h < 24) return h + "h ago";
  const d = Math.floor(h / 24); if (d < 30) return d + "d ago";
  const mo = Math.floor(d / 30); if (mo < 12) return mo + "mo ago";
  return Math.floor(mo / 12) + "y ago";
}

function sectionGrid(boards) {
  const grid = document.createElement("div");
  grid.className = "section-grid";
  boards.forEach((b) => grid.appendChild(renderListCard(b)));
  return grid;
}

function appendSection(title, boards) {
  if (!boards.length) return;
  const sec = document.createElement("div");
  sec.className = "menu-section";
  const h = document.createElement("div");
  h.className = "menu-section-title";
  h.textContent = `${title} · ${boards.length}`;
  sec.append(h, sectionGrid(boards));
  menuGrid.appendChild(sec);
}

function renderMenu() {
  const boards = orderedBoards();
  menuGrid.innerHTML = "";

  if (backend.mode === "cloud") {
    // Owner's home: Private + Public + Shared sections. ('shared' is link-only for
    // *others* — never publicly listed — but still shown here for the owner.)
    const priv = boards.filter((b) => (b.visibility || "private") === "private");
    const pub = boards.filter((b) => b.visibility === "public");
    const shared = boards.filter((b) => b.visibility === "shared");
    menuEmpty.hidden = boards.length > 0;
    menuGrid.hidden = boards.length === 0;
    appendSection("Private", priv);
    appendSection("Public", pub);
    appendSection("Shared", shared);
  } else {
    // Local mode: one flat grid.
    menuEmpty.hidden = boards.length > 0;
    menuGrid.hidden = boards.length === 0;
    if (boards.length) menuGrid.appendChild(sectionGrid(boards));
  }
}

/* ============================================================
   Helpers
   ============================================================ */
function toast(msg, type) {
  const el = document.createElement("div");
  el.className = "toast" + (type === "err" ? " err" : "");
  el.textContent = msg;
  document.getElementById("toasts").appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

// Pick text color (black/white) for readability on a given hex background.
function contrastColor(hex) {
  const c = hex.replace("#", "");
  const r = parseInt(c.substring(0, 2), 16);
  const g = parseInt(c.substring(2, 4), 16);
  const b = parseInt(c.substring(4, 6), 16);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.6 ? "#1a1a1a" : "#ffffff";
}

function download(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// Open a file picker and resolve with selected files.
function pickFiles(accept, multiple) {
  return new Promise((resolve) => {
    const inp = document.createElement("input");
    inp.type = "file";
    inp.accept = accept;
    inp.multiple = !!multiple;
    inp.onchange = () => resolve([...inp.files]);
    inp.click();
  });
}

// Downscale an image blob/file to a max dimension; return both a Blob (for upload)
// and a data URL (for local storage / instant preview).
async function toDownscaledBlob(blob, max = 480) {
  let img;
  try {
    img = await createImageBitmap(blob);
  } catch (e) {
    // Fallback via <img> + object URL
    img = await new Promise((res, rej) => {
      const url = URL.createObjectURL(blob);
      const i = new Image();
      i.onload = () => { URL.revokeObjectURL(url); res(i); };
      i.onerror = () => { URL.revokeObjectURL(url); rej(e); };
      i.src = url;
    });
  }
  const w0 = img.width, h0 = img.height;
  const scale = Math.min(1, max / Math.max(w0, h0));
  const w = Math.max(1, Math.round(w0 * scale));
  const h = Math.max(1, Math.round(h0 * scale));
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(img, 0, 0, w, h);
  if (img.close) img.close();
  const dataURL = canvas.toDataURL("image/png");
  const out = await new Promise((res) => canvas.toBlob(res, "image/png"));
  return { blob: out, dataURL };
}

// Backwards-compatible helper.
async function toDownscaledDataURL(blob, max = 480) {
  return (await toDownscaledBlob(blob, max)).dataURL;
}

/* ============================================================
   Item / container model operations
   ============================================================ */
function getArray(containerKey) {
  if (containerKey === "pool") return state.pool;
  const tier = state.tiers.find((t) => t.id === containerKey);
  return tier ? tier.items : null;
}

function findItemLocation(id) {
  if (state.pool.includes(id)) return state.pool;
  for (const t of state.tiers) if (t.items.includes(id)) return t.items;
  return null;
}

function moveItem(id, containerKey, index) {
  const src = findItemLocation(id);
  if (src) src.splice(src.indexOf(id), 1);
  const target = getArray(containerKey);
  if (!target) return;
  const i = Math.max(0, Math.min(index, target.length));
  target.splice(i, 0, id);
}

function deleteItem(id) {
  const src = findItemLocation(id);
  if (src) src.splice(src.indexOf(id), 1);
  delete state.items[id];
}

// Create item(s) from image files; append to a container (default pool).
// Upload a blob to Storage and resolve with its public URL.
function uploadBlobToStorage(boardId, itemId, blob) {
  const path = `${currentUser.id}/${boardId}/${itemId}.png`;
  return sb.storage.from("tier-images").upload(path, blob, { contentType: "image/png", upsert: true })
    .then((up) => {
      if (up.error) throw up.error;
      return sb.storage.from("tier-images").getPublicUrl(path).data.publicUrl;
    });
}

// Optimistic add: show the downscaled image instantly (data URL), then in cloud mode
// upload to Storage in the background and swap in the public URL.
async function addItemFromBlob(srcBlob, name, containerKey, index) {
  let small;
  try { small = await toDownscaledBlob(srcBlob); }
  catch (e) { toast("Couldn't read an image", "err"); return; }
  const id = uid();
  const item = { id, name: name || ("Item " + (++itemCounter)), description: "", image: small.dataURL };
  const cloud = backend.mode === "cloud";
  if (cloud) item.uploading = true;
  state.items[id] = item;
  const target = getArray(containerKey) || state.pool;
  if (index == null || index > target.length) target.push(id);
  else target.splice(index, 0, id);
  render();

  if (!cloud) { persist(); return; }

  const board = state; // capture so navigation can't misfile the upload
  uploadBlobToStorage(board.id, id, small.blob).then((url) => {
    const it = board.items[id];
    if (!it) return; // deleted meanwhile
    it.image = url;
    delete it.uploading;
    if (state === board) render();
    backend.save(board);
  }).catch(() => {
    const it = board.items[id];
    if (it) delete it.uploading;
    if (state === board) render();
    backend.save(board); // keep the data URL as a fallback
    toast("Image upload failed — kept a local copy", "err");
  });
}

async function addImagesFromFiles(files, containerKey = "pool", startIndex = null) {
  const images = [...files].filter((f) => f.type.startsWith("image/"));
  if (!images.length) return;
  let idx = startIndex;
  for (const file of images) {
    const name = (file.name || "").replace(/\.[^.]+$/, "") || null;
    await addItemFromBlob(file, name, containerKey, idx);
    if (idx != null) idx++;
  }
  toast(images.length + " item" + (images.length > 1 ? "s" : "") + " added");
}

async function addImageFromBlob(blob, containerKey = "pool") {
  await addItemFromBlob(blob, null, containerKey, null);
  toast("Item added — click it to rename");
}

function render() {
  // Board
  boardEl.innerHTML = "";

    const row = document.createElement("div");

      label.title = "Click to rename";
      label.addEventListener("keydown", (e) => {

      });
      label.addEventListener("blur", () => {

      });

    if (canEdit) {
      const ctrls = document.createElement("div");

      const up = ctrlBtn("▲", "Move up", () => reorderTier(idx, -1));
      const down = ctrlBtn("▼", "Move down", () => reorderTier(idx, 1));

      ctrls.append(up, down, del);

    boardEl.appendChild(row);
  });

  // Pool
  poolEl.innerHTML = "";
  poolEl.dataset.container = "pool";
  state.pool.forEach((id) => poolEl.appendChild(renderCard(id)));
  if (canEdit) {
    if (state.pool.length === 0) {
      const hint = document.createElement("div");
      hint.className = "hint";
      hint.innerHTML =
        'Paste with <kbd>⌘V</kbd> / <kbd>Ctrl V</kbd>, drag image files here, or click <b>＋</b> →';
      poolEl.appendChild(hint);
    }
    poolEl.appendChild(makeAddTile());
  }
  wireDropzone(poolEl);
}

function renderCard(id) {
  const item = state.items[id];
  const card = document.createElement("div");
  card.className = "card" + (item.uploading ? " uploading" : "");
  card.dataset.id = id;
  if (item.description) card.title = item.description;

    media.alt = item.name;

  }

  cap.className = "cap";
  cap.textContent = item.name;

  card.append(media, cap);

  if (!canEdit) {
    card.style.cursor = "default";
    return card;
  }

  del.textContent = "×";

    deleteItem(id);
    render();
    persist();
  });
  card.appendChild(del);

  card.addEventListener("click", () => {
    if (Date.now() - lastDropTime < 400) return; // ignore the click synthesized after a touch-drag
    openEditor(id);
  });
  // Mouse drag-and-drop (HTML5 DnD — desktop)
  card.addEventListener("dragstart", (e) => {
    draggedId = id;
    e.dataTransfer.setData("application/x-tier-item", id);
    e.dataTransfer.effectAllowed = "move";
    card.classList.add("dragging");
  });
  card.addEventListener("dragend", clearDragState);
  // Touch drag-and-drop (long-press to pick up — mobile)
  card.addEventListener("touchstart", (e) => cardTouchStart(e, id, card), { passive: true });

  return card;
}

/* ============================================================
   Drag & drop (items)
   ============================================================ */
let draggedId = null;
const placeholder = document.createElement("div");
placeholder.className = "card placeholder";

function clearDragState() {
  draggedId = null;
  placeholder.remove();
  document.querySelectorAll(".card.dragging").forEach((c) => c.classList.remove("dragging"));
  document.querySelectorAll(".dropzone.drag-over").forEach((z) => z.classList.remove("drag-over"));
}

// Element (real card) the placeholder should be inserted before, or null to append.
function insertBeforeTarget(zone, x, y) {
  const cards = [...zone.querySelectorAll(".card:not(.dragging):not(.placeholder):not(.add-tile)")];
  for (const c of cards) {
    const r = c.getBoundingClientRect();
    if (y >= r.top && y <= r.bottom && x < r.left + r.width / 2) return c;
  }
  return null;
}

function wireDropzone(zone) {
  if (!canEdit) return; // read-only: no drops
  zone.addEventListener("dragover", (e) => {
    const isItem = draggedId || e.dataTransfer.types.includes("application/x-tier-item");
    const isFiles = e.dataTransfer.types.includes("Files");
    if (!isItem && !isFiles) return;
    e.preventDefault();
    e.dataTransfer.dropEffect = isFiles && !isItem ? "copy" : "move";
    if (isItem) {
      const before = insertBeforeTarget(zone, e.clientX, e.clientY);
      if (before) zone.insertBefore(placeholder, before);
      else zone.appendChild(placeholder);
    } else {
      zone.classList.add("drag-over");
    }
  });

  zone.addEventListener("dragleave", (e) => {
    if (!zone.contains(e.relatedTarget)) zone.classList.remove("drag-over");
  });

  zone.addEventListener("drop", (e) => {
    e.preventDefault();
    e.stopPropagation();
    zone.classList.remove("drag-over");
    const containerKey = zone.dataset.container;

    // External image files dropped into this zone
    if (e.dataTransfer.files && e.dataTransfer.files.length) {
      const index = placeholder.parentNode === zone ? indexOfPlaceholder(zone) : null;
      placeholder.remove();
      addImagesFromFiles(e.dataTransfer.files, containerKey, index);
      return;
    }

    // Internal item move
    const id = draggedId || e.dataTransfer.getData("application/x-tier-item");
    if (!id) return;
    const index = placeholder.parentNode === zone ? indexOfPlaceholder(zone) : getArray(containerKey).length;
    placeholder.remove();
    moveItem(id, containerKey, index);
    render();
    persist();
  });
}

// Count real cards before the placeholder in a zone.
function indexOfPlaceholder(zone) {
  let i = 0;
  for (const child of zone.children) {
    if (child === placeholder) break;
    if (child.classList.contains("card") && !child.classList.contains("add-tile")) i++;
  }
  return i;
}

/* ============================================================
   Touch drag-and-drop (mobile) — long-press to pick up, then drag.
   HTML5 DnD doesn't fire from touch, so this drives the same
   placeholder/insertBeforeTarget/moveItem logic from touch events.
   ============================================================ */
let touchDrag = null;  // { id, card, startX, startY, offX, offY, dragging, ghost, timer }
let lastDropTime = 0;  // suppress the click synthesized right after a touch-drop

function zoneFromPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  if (!el) return null;
  return el.closest(".dropzone")
    || (el.closest(".tier") && el.closest(".tier").querySelector(".dropzone"))
    || (el.closest(".pool") && poolEl)
    || null;
}

function cardTouchStart(e, id, card) {
  if (!canEdit || e.touches.length !== 1) return;
  const t = e.touches[0];
  touchDrag = { id, card, startX: t.clientX, startY: t.clientY, dragging: false, ghost: null,
    timer: setTimeout(beginTouchDrag, 250) };
  document.addEventListener("touchmove", onTouchMove, { passive: false });
  document.addEventListener("touchend", onTouchEnd);
  document.addEventListener("touchcancel", endTouch);
}

function beginTouchDrag() {
  if (!touchDrag) return;
  const { card, startX, startY, id } = touchDrag;
  touchDrag.dragging = true;
  draggedId = id;
  if (navigator.vibrate) { try { navigator.vibrate(12); } catch (e) {} }
  const r = card.getBoundingClientRect();
  touchDrag.offX = startX - r.left;
  touchDrag.offY = startY - r.top;
  const ghost = card.cloneNode(true);
  ghost.classList.add("drag-ghost");
  ghost.querySelectorAll(".del").forEach((d) => d.remove());
  ghost.style.width = r.width + "px";
  ghost.style.height = r.height + "px";
  document.body.appendChild(ghost);
  touchDrag.ghost = ghost;
  card.classList.add("dragging");
  moveGhost(startX, startY);
}

function moveGhost(x, y) {
  if (!touchDrag || !touchDrag.ghost) return;
  touchDrag.ghost.style.left = (x - touchDrag.offX) + "px";
  touchDrag.ghost.style.top = (y - touchDrag.offY) + "px";
}

function onTouchMove(e) {
  if (!touchDrag) return;
  const t = e.touches[0];
  if (!touchDrag.dragging) {
    // Finger moved before the long-press fired → treat as scroll/tap, not a drag.
    if (Math.abs(t.clientX - touchDrag.startX) > 10 || Math.abs(t.clientY - touchDrag.startY) > 10) endTouch();
    return;
  }
  e.preventDefault(); // we own the gesture now; stop the page from scrolling
  moveGhost(t.clientX, t.clientY);
  const m = 72; // edge auto-scroll so off-screen tiers are reachable
  if (t.clientY < m) window.scrollBy(0, -14);
  else if (t.clientY > window.innerHeight - m) window.scrollBy(0, 14);
  document.querySelectorAll(".dropzone.drag-over").forEach((z) => z.classList.remove("drag-over"));
  const zone = zoneFromPoint(t.clientX, t.clientY);
  if (zone) {
    const before = insertBeforeTarget(zone, t.clientX, t.clientY);
    if (before) zone.insertBefore(placeholder, before); else zone.appendChild(placeholder);
  } else {
    placeholder.remove();
  }
}

function onTouchEnd(e) {
  if (!touchDrag) return;
  if (touchDrag.dragging) {
    e.preventDefault(); // cancel the synthetic click that would follow
    lastDropTime = Date.now();
    const id = touchDrag.id;
    const zone = placeholder.parentNode;
    const valid = zone && zone.classList && zone.classList.contains("dropzone");
    const containerKey = valid ? zone.dataset.container : null;
    const index = valid ? indexOfPlaceholder(zone) : -1;
    endTouch();
    if (valid) { moveItem(id, containerKey, index); render(); persist(); }
    return;
  }
  endTouch();
}

function endTouch() {
  if (touchDrag) {
    clearTimeout(touchDrag.timer);
    if (touchDrag.ghost) touchDrag.ghost.remove();
    if (touchDrag.card) touchDrag.card.classList.remove("dragging");
  }
  touchDrag = null;
  draggedId = null;
  placeholder.remove();
  document.querySelectorAll(".dropzone.drag-over").forEach((z) => z.classList.remove("drag-over"));
  document.removeEventListener("touchmove", onTouchMove);
  document.removeEventListener("touchend", onTouchEnd);
  document.removeEventListener("touchcancel", endTouch);
}

/* ============================================================
   Tier management
   ============================================================ */
function reorderTier(idx, dir) {
  const j = idx + dir;
  if (j < 0 || j >= state.tiers.length) return;
  const [t] = state.tiers.splice(idx, 1);
  state.tiers.splice(j, 0, t);
  render();
  persist();
}

function removeTier(id) {
  const tier = state.tiers.find((t) => t.id === id);
  if (!tier) return;
  if (tier.items.length && !confirm(`Delete tier "${tier.name}"? Its ${tier.items.length} item(s) move to Unranked.`))
    return;
  state.pool.push(...tier.items);
  state.tiers = state.tiers.filter((t) => t.id !== id);
  render();
  persist();
}

const NEW_TIER_COLORS = ["#9fd3ff", "#c8a6ff", "#ff9ecb", "#a0e6c0", "#ffd28a", "#8fe0e6"];
function addTier() {
  const color = NEW_TIER_COLORS[state.tiers.length % NEW_TIER_COLORS.length];
  state.tiers.push({ id: uid(), name: "New", color, items: [] });
  render();
  persist();
  // Focus the new tier's label for immediate renaming
  const last = boardEl.lastElementChild;
  if (last) {
    const label = last.querySelector(".tier-label");
    label.focus();
    document.getSelection().selectAllChildren(label);
  }
}

// Show the preview (image or monogram stub) and label the image buttons for the target's state.

  const t = editTarget();
  if (!t) return;
  if (t.image) {
    editPreview.src = t.image;
    editPreview.hidden = false;
    editStub.hidden = true;
    editReplaceBtn.textContent = "Replace image";
    editRemoveBtn.hidden = false;
  } else {
    editPreview.removeAttribute("src");
    editPreview.hidden = true;
    editStub.hidden = false;
    const nm = editName.value || t.name;
    editStub.style.background = colorFromString(nm);
    editStub.textContent = initials(nm);
    editReplaceBtn.textContent = "Add image";
    editRemoveBtn.hidden = true;
  }
}

function openEditor(id) {
  editingId = id;
  editingDraft = null;
  const item = state.items[id];
  editName.value = item.name;
  editDesc.value = item.description || "";
  editDeleteBtn.hidden = false;
  refreshEditorMedia();
  editorOverlay.classList.add("show");
  editName.focus();
  editName.select();
}

function openCreateEditor() {
  editingId = null;
  editingDraft = { id: uid(), name: "", description: "", image: null };
  editName.value = "";
  editDesc.value = "";
  editDeleteBtn.hidden = true; // nothing to delete yet — Cancel discards
  refreshEditorMedia();
  editorOverlay.classList.add("show");
  editName.focus();
}

function closeEditor() {
  editorOverlay.classList.remove("show");
  editingId = null;
  editingDraft = null;
}

function saveEditor() {
  const t = editTarget();
  if (!t) return;
  t.name = editName.value.trim() || (editingId ? t.name : "Item " + (++itemCounter));
  t.description = editDesc.value.trim();
  if (editingDraft) {
    const pendingBlob = t._pendingBlob; delete t._pendingBlob;
    state.items[t.id] = t;
    state.pool.push(t.id);
    // Cloud: a freshly-added image came in as a data URL — upload it in the background.
    if (backend.mode === "cloud" && pendingBlob) {
      const id = t.id, board = state;
      t.uploading = true;
      uploadBlobToStorage(board.id, id, pendingBlob).then((url) => {
        const it = board.items[id]; if (!it) return;
        it.image = url; delete it.uploading;
        if (state === board) render();
        backend.save(board);
      }).catch(() => {
        const it = board.items[id]; if (it) delete it.uploading;
        if (state === board) render(); backend.save(board);
      });
    }
  }
  closeEditor();
  render();
  persist();
}
document.getElementById("editSave").addEventListener("click", saveEditor);
// Enter saves: plain Enter in the single-line name field; Cmd/Ctrl+Enter in the
// multi-line description (so plain Enter there still inserts a newline).
editName.addEventListener("keydown", (e) => {
  if (e.key === "Enter") { e.preventDefault(); saveEditor(); }
});
editName.addEventListener("input", () => { const t = editTarget(); if (t && !t.image) refreshEditorMedia(); });
editDesc.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); saveEditor(); }
});
document.getElementById("editCancel").addEventListener("click", closeEditor);
editDeleteBtn.addEventListener("click", () => {
  if (!editingId) return;
  deleteItem(editingId);
  closeEditor();
  render();
  persist();
});

editReplaceBtn.addEventListener("click", async () => {
  const t = editTarget();
  if (!t) return;
  const files = await pickFiles("image/*", false);
  if (!files.length) return;
  let small;
  try { small = await toDownscaledBlob(files[0]); }
  catch (e) { toast("Couldn't read image", "err"); return; }
  t.image = small.dataURL;
  refreshEditorMedia();
  if (editingDraft) { t._pendingBlob = small.blob; return; } // uploaded on Save (cloud)
  // Existing item: optimistic local set + background upload in cloud mode.
  if (backend.mode !== "cloud") { render(); persist(); return; }
  const id = editingId, board = state;
  t.uploading = true;
  render();
  uploadBlobToStorage(board.id, id, small.blob).then((url) => {
    const it = board.items[id]; if (!it) return;
    it.image = url; delete it.uploading;
    if (state === board) render();
    if (editingId === id) refreshEditorMedia();
    backend.save(board);
  }).catch(() => {
    const it = board.items[id]; if (it) delete it.uploading;
    if (state === board) render();
    backend.save(board);
    toast("Image upload failed — kept a local copy", "err");
  });
});

editRemoveBtn.addEventListener("click", () => {
  const t = editTarget();
  if (!t) return;
  t.image = null;
  delete t.uploading;
  delete t._pendingBlob;
  refreshEditorMedia();
  if (editingId) { render(); persist(); }
});
editorOverlay.addEventListener("mousedown", (e) => { if (e.target === editorOverlay) closeEditor(); });
document.addEventListener("keydown", (e) => {
  if (e.key !== "Escape") return;
  if (editorOverlay.classList.contains("show")) closeEditor();
  closeUserMenu();
});

/* ============================================================
   Export PNG (native canvas)
   ============================================================ */
function drawCover(ctx, img, dx, dy, dw, dh) {
  const ir = img.width / img.height;
  const tr = dw / dh;
  let sw, sh, sx, sy;
  if (ir > tr) { sh = img.height; sw = sh * tr; sx = (img.width - sw) / 2; sy = 0; }
  else { sw = img.width; sh = sw / tr; sx = 0; sy = (img.height - sh) / 2; }
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

function fitText(ctx, text, maxW) {
  if (ctx.measureText(text).width <= maxW) return text;
  let t = text;
  while (t.length > 1 && ctx.measureText(t + "…").width > maxW) t = t.slice(0, -1);
  return t + "…";
}

async function exportPNG() {
  const PAD = 20, LABEL_W = 96, CELL = 92, GAP = 8, CAP_H = 20, ROW_PAD = 8, ITEMS_W = 880;
  const cols = Math.max(1, Math.floor((ITEMS_W + GAP) / (CELL + GAP)));
  const canvasW = PAD + LABEL_W + GAP + ITEMS_W + PAD;

  // Preload images (skip image-less stub items)
  const ids = state.tiers.flatMap((t) => t.items).filter((id) => state.items[id] && state.items[id].image);
  const imgs = {};
  await Promise.all(ids.map((id) => new Promise((res) => {
    const im = new Image();
    im.crossOrigin = "anonymous"; // allow drawing Storage-hosted images without tainting the canvas
    im.onload = () => { imgs[id] = im; res(); };
    im.onerror = () => res();
    im.src = state.items[id].image;
  })));

  // Measure total height
  const tierH = (n) => {
    const rows = Math.max(1, Math.ceil(n / cols));
    return rows * (CELL + CAP_H) + (rows - 1) * GAP + 2 * ROW_PAD;
  };
  let totalH = PAD;
  state.tiers.forEach((t) => { totalH += tierH(t.items.length) + GAP; });
  totalH += PAD - GAP;

  const canvas = document.createElement("canvas");
  canvas.width = canvasW;
  canvas.height = Math.max(totalH, PAD * 2 + CELL);
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "#15161b";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  let y = PAD;
  for (const tier of state.tiers) {
    const h = tierH(tier.items.length);

    // Label
    ctx.fillStyle = tier.color;
    roundRect(ctx, PAD, y, LABEL_W, h, 8);
    ctx.fill();
    ctx.fillStyle = contrastColor(tier.color);
    ctx.font = "800 22px -apple-system, Segoe UI, Roboto, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(fitText(ctx, tier.name, LABEL_W - 10), PAD + LABEL_W / 2, y + h / 2);

    // Items
    const x0 = PAD + LABEL_W + GAP;
    tier.items.forEach((id, i) => {
      const col = i % cols, rowN = Math.floor(i / cols);
      const x = x0 + col * (CELL + GAP);
      const cy = y + ROW_PAD + rowN * (CELL + CAP_H + GAP);
      ctx.fillStyle = "#262934";
      roundRect(ctx, x, cy, CELL, CELL + CAP_H, 7);
      ctx.fill();
      ctx.save();
      roundRect(ctx, x, cy, CELL, CELL, 7);
      ctx.clip();
      const it = state.items[id];
      if (imgs[id]) {
        ctx.fillStyle = "#0d0e12";
        ctx.fillRect(x, cy, CELL, CELL);
        drawCover(ctx, imgs[id], x, cy, CELL, CELL);
      } else {
        ctx.fillStyle = colorFromString(it.name);
        ctx.fillRect(x, cy, CELL, CELL);
        ctx.fillStyle = "#fff";
        ctx.font = "800 30px -apple-system, Segoe UI, Roboto, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(initials(it.name), x + CELL / 2, cy + CELL / 2);
      }
      ctx.restore();
      // Caption
      ctx.fillStyle = "#e9eaed";
      ctx.font = "500 11px -apple-system, Segoe UI, Roboto, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(fitText(ctx, state.items[id].name, CELL - 8), x + CELL / 2, cy + CELL + CAP_H / 2);
    });

    y += h + GAP;
  }

  canvas.toBlob((blob) => {
    if (blob) { download(blob, "tier-list.png"); toast("PNG exported"); }
  }, "image/png");
}

function roundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* ============================================================
   Export / import JSON
   ============================================================ */
function slugify(s) {
  return (s || "tier-list").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "") || "tier-list";
}

function exportJSON() {
  if (!state) return;
  const out = { name: state.name, version: 1, tiers: state.tiers, pool: state.pool, items: state.items };
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  download(blob, slugify(state.name) + ".json");
  toast("JSON exported");
}

// Import a JSON file from the menu → creates a new list and opens it.
async function importList() {
  const files = await pickFiles("application/json,.json", false);
  if (!files.length) return;
  try {
    const text = await files[0].text();
    const data = JSON.parse(text);
    if (!data || !Array.isArray(data.tiers) || typeof data.items !== "object" || !Array.isArray(data.pool))
      throw new Error("bad shape");
    // Trust the file but ensure required tier fields exist.
    data.tiers.forEach((t) => {
      t.id = t.id || uid();
      t.items = Array.isArray(t.items) ? t.items : [];
      t.color = t.color || "#888888";
      t.name = t.name == null ? "?" : String(t.name);
    });
    const t = nowMs();
    const board = {
      id: uid(),
      name: (data.name && String(data.name)) || files[0].name.replace(/\.json$/i, "") || "Imported list",
      version: 1, tiers: data.tiers, pool: data.pool, items: data.items,
      createdAt: t, updatedAt: t,
    };
    if (backend.mode === "cloud" && currentUser) {
      board.owner = currentUser.id;
      board.visibility = "private";
      await rehostImagesToStorage(board); // move any base64 images into Storage
    }
    boardsCache.push(board);
    order.push(board.id);
    const ok = await backend.save(board);
    if (ok === false) {
      boardsCache = boardsCache.filter((x) => x.id !== board.id);
      order = order.filter((x) => x !== board.id);
      toast("Import failed — couldn't save to cloud", "err");
      return;
    }
    toast("List imported");
    goBoard(board.id);
  } catch (e) {
    toast("Import failed — not a valid tier-list file", "err");
  }
}

/* ============================================================
   Global handlers
   ============================================================ */
// Paste image from clipboard (only while editing a board)
document.addEventListener("paste", (e) => {
  if (currentView !== "board" || !canEdit) return;
  if (editorOverlay.classList.contains("show")) return; // let textfields paste normally
  const items = e.clipboardData && e.clipboardData.items;
  if (!items) return;
  for (const it of items) {
    if (it.type && it.type.startsWith("image/")) {
      const blob = it.getAsFile();
      if (blob) { e.preventDefault(); addImageFromBlob(blob, "pool"); return; }
    }
  }
});

// Page-level file drop (areas outside any dropzone) + prevent browser opening the file
window.addEventListener("dragover", (e) => {
  if (e.dataTransfer && e.dataTransfer.types.includes("Files")) {
    e.preventDefault();
    if (currentView === "board" && canEdit) document.body.classList.add("file-dragging");
  }
});
window.addEventListener("dragleave", (e) => {
  if (!e.relatedTarget) document.body.classList.remove("file-dragging");
});
window.addEventListener("drop", (e) => {
  document.body.classList.remove("file-dragging");
  if (e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length) {
    e.preventDefault(); // a zone would have stopPropagation'd already; this catches page drops
    if (currentView === "board" && canEdit) addImagesFromFiles(e.dataTransfer.files, "pool");
  }
});

// Board toolbar
document.getElementById("backBtn").addEventListener("click", goMenu);
document.getElementById("addTierBtn").addEventListener("click", addTier);
document.getElementById("exportPngBtn").addEventListener("click", exportPNG);
document.getElementById("exportJsonBtn").addEventListener("click", exportJSON);
// Reset = move every ranked item back to Unranked (keeps tiers + items).
document.getElementById("resetBtn").addEventListener("click", () => {
  if (!state || !canEdit) return;
  const moved = [];
  state.tiers.forEach((t) => { moved.push(...t.items); t.items = []; });
  if (!moved.length) { toast("Nothing to un-rank"); return; }
  state.pool.push(...moved);
  render();
  persist();
  toast("All items moved to Unranked");
});
document.getElementById("shareBtn").addEventListener("click", shareCurrent);
document.getElementById("visibilitySelect").addEventListener("change", (e) => setVisibility(e.target.value));
document.getElementById("roDup").addEventListener("click", duplicateOpenToMyLists);
// Remove all = delete every item (de-emphasized, strong confirm; keeps tiers).
document.getElementById("removeAllBtn").addEventListener("click", () => {
  if (!state || !canEdit) return;
  const n = Object.keys(state.items).length;
  if (!n) { toast("No items to remove"); return; }
  if (!confirm(`Permanently remove all ${n} item${n > 1 ? "s" : ""} from this list? This can't be undone.`)) return;
  state.items = {};
  state.tiers.forEach((t) => { t.items = []; });
  state.pool = [];
  itemCounter = 0;
  render();
  persist();
  toast("All items removed");
});

// Editable board name
boardNameInput.addEventListener("change", () => {
  if (!state || !canEdit) return;
  state.name = boardNameInput.value.trim() || "Untitled list";
  boardNameInput.value = state.name;
  persist();
});
boardNameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") boardNameInput.blur(); });

// Menu toolbar
document.getElementById("newListBtn").addEventListener("click", createBoard);
document.getElementById("newListBtn2").addEventListener("click", createBoard);
document.getElementById("importListBtn").addEventListener("click", importList);

/* ============================================================
   Boot
   ============================================================ */
(async function init() {
  db = await openDB();

  // Resolve auth session (consumes any OAuth redirect hash via supabase-js).
  if (sb) {
    try {
      const { data } = await sb.auth.getSession();
      setUserFromSession(data.session);
    } catch (e) { console.warn("getSession failed", e); }
    sb.auth.onAuthStateChange(async (_event, session) => {
      const prevId = currentUser && currentUser.id;
      setUserFromSession(session);
      const nextId = currentUser && currentUser.id;
      if (prevId === nextId) return; // ignore token refreshes (same user)
      // Real sign-in/out (e.g. from another tab): resync backend, data, and UI.
      backend = currentUser ? cloudBackend : localBackend;
      await backend.load();
      renderAuth();
      await route();
    });
  }
  // Flush any pending edit before the tab closes / reloads.
  window.addEventListener("beforeunload", flushSave);
  // Clean a leftover OAuth token/error hash from the URL.
  if (/(access_token|error)=/.test(location.hash)) history.replaceState(null, "", location.pathname);

  backend = currentUser ? cloudBackend : localBackend;
  await backend.load();
  renderAuth();

  window.addEventListener("hashchange", route);
  await route();

  if (currentUser) await maybeOfferSync();
  if (!db) toast("Local storage unavailable", "err");
})();
</script>
